    <style>
        /* Previous styles... */

        .highlight-block {
          background: linear-gradient(120deg, #40e0d0 25%, #7f5af0 85%);
          color: #fff;
          font-size: 1.28rem;
          font-weight: 700;
          padding: 1.7rem 2.1rem;
          border-radius: 1.4rem;
          box-shadow: 0 6px 32px 0 #40e0d0cc, 0 1px 18px 0 #7f5af080;
          margin-top: 1.9em;
          margin-bottom: 0.15em;
          text-align: left;
          letter-spacing: 0.02em;
          border: 3px solid #fff4;
          display: inline-block;
          transition: box-shadow 0.3s, transform 0.2s;
        }
        .highlight-block a {
          color: #ffe96b;
          text-decoration: underline;
          font-weight: 800;
          transition: color 0.2s;
        }
        .highlight-block a:hover {
          color: #fff;
          text-decoration: none;
        }
        .cd-label {
          color: #fffb;
          font-size: 1.14em;
          letter-spacing: 1px;
          margin-right: 0.3em;
          text-shadow: 0 1px 8px #23233a88;
        }
    </style>
</head>
